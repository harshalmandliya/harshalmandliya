name: CI\n\non:\n  push:\n    branches: [ main ]\n  pull_request:\n    branches: [ main ]\n\njobs:\n  build:\n    runs-on: ubuntu-latest\n\n    permissions:\n      contents: write\n\n    steps:\n      - name: Checkout code\n        uses: actions/checkout@v4\n        with:\n          fetch-depth: 0\n\n      - name: Execute Contribution Graph\n        uses: abozanona/pacman-contribution-graph@v1\n        with:\n          github_token: ${{ secrets.GITHUB_TOKEN }}\n\n      - name: Display Graph\n        run: |\n          if [ ! -f contribution-graph.svg ]; then\n            echo 'Error: contribution-graph.svg was not generated.';\n            exit 1;\n          fi;\n          # Further commands to display or upload the graph\n          